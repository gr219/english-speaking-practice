name: Build and Push Docker Image

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: gr219/english-speaking-practice

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Vosk model
        run: |
          curl -L "https://alphacephei.com/vosk/models/vosk-model-small-en-us-0.15.zip" -o /tmp/vosk-model.zip
          unzip -o /tmp/vosk-model.zip -d /tmp/vosk-model
          mv /tmp/vosk-model/vosk-model-small-en-us-0.15 model

      - name: Download libvosk
        run: |
          curl -L "https://github.com/alphacep/vosk-api/releases/download/v0.3.50/vosk-linux-x86_64-0.3.50.zip" -o /tmp/vosk-linux.zip
          unzip -o /tmp/vosk-linux.zip -d /tmp/vosk-linux
          mkdir -p deps
          cp /tmp/vosk-linux/vosk-linux-x86_64-0.3.50/libvosk.so deps/libvosk.so

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
